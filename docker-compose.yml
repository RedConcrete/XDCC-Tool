services:

  # Aktuell ungenutzt (kein aktives Mullvad-Abo). xdcc laeuft mit normalem
  # Docker-Netzwerk. Bei neuem VPN-Abo: restart auf "unless-stopped" setzen
  # und bei xdcc network_mode/depends_on auf gluetun wieder aktivieren.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: xdcc-gluetun
    restart: "no"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-mullvad}
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${MULLVAD_ADDRESS}
      - SERVER_HOSTNAMES=${MULLVAD_SERVER_HOSTNAMES-nl-ams-wg-103}
      - WIREGUARD_ENDPOINT_IP=${WIREGUARD_ENDPOINT_IP:-}
      - WIREGUARD_ENDPOINT_PORT=${WIREGUARD_ENDPOINT_PORT:-51820}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY:-}
      - 'HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE={"auth":"apikey","apikey":"${GLUETUN_API_KEY}"}'
      - DOT=off
      - BLOCK_MALICIOUS=off
      - DNS_ADDRESS=1.1.1.1
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  xdcc:
    build: .
    container_name: xdcc-downloader
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      - WISHLIST=/app/wishlist.md
      - DOWNLOAD_DIR=/downloads
      - DONE_LOG=/app/downloaded.txt
      - CHAT_LOG=/app/Chat.txt
      - LOGS_DIR=/app/logs
      - SEARCH_LANG=German
      - CHANNELS_CONFIG=/app/channels.json
      - RIZON_SASL_PASS=${RIZON_SASL_PASS}
      - GLUETUN_API_KEY=${GLUETUN_API_KEY}
      - GLUETUN_CONTROL_URL=http://gluetun:8000
      - ENV_FILE=/app/.env
    volumes:
      - ./wishlist.md:/app/wishlist.md
      - ./downloaded.txt:/app/downloaded.txt
      - ./channels.json:/app/channels.json
      - ./server_state.json:/app/server_state.json
      - ./.env:/app/.env
      - ./restart_trigger:/app/restart_trigger
      - ./Chat.txt:/app/Chat.txt
      - ./logs:/app/logs
      - ./scripts/downloader.py:/app/downloader.py
      - ./scripts/xdcc_client.py:/app/xdcc_client.py
      - ./scripts/cli.py:/app/cli.py
      - ./scripts/app.py:/app/app.py
      - ./templates:/app/templates
      - ./static:/app/static
      - /mnt/jellyfin2/media:/downloads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
